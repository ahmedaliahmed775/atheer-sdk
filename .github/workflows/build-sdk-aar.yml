name: Publish Atheer SDK to GitHub Packages

# متى يعمل هذا السكربت؟
on:
  push:
    branches:
      - main # إذا كان الفرع الأساسي لديك اسمه master، قم بتغيير هذه الكلمة إلى master

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest

    # إعطاء الصلاحيات اللازمة لـ GitHub Token لكي يتمكن من رفع الحزمة
    permissions:
      contents: read
      packages: write 

    steps:
      # 1. جلب الكود المصدري
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. تجهيز بيئة الجافا (JDK 17) المتوافقة مع مشروعك
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle # تفعيل الكاش لتسريع عملية البناء في المرات القادمة

      # 3. إعطاء صلاحية التشغيل لملف Gradle
      - name: Make gradlew executable
        run: chmod +x gradlew

      # 4. بناء المكتبة ونشرها إلى GitHub Packages
      - name: Build and Publish to GitHub Packages
        # هذا الأمر ينفذ مهمة النشر التي أضفناها في build.gradle.kts
        run: ./gradlew :atheer-sdk:publishReleasePublicationToGitHubPackagesRepository
        env:
          # تمرير المتغيرات البيئية التي يحتاجها بلوك repositories في build.gradle.kts
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
