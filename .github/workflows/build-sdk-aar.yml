name: Build SDK AAR

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # يسمح لك بتشغيل البناء يدوياً بضغطة زر

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # هذا هو السطر الأهم: أمر بناء مكتبة SDK
      - name: Build Release AAR
        run: ./gradlew :atheer-sdk:assembleRelease

      # حفظ ملف AAR لكي تتمكن من تحميله
      - name: Upload AAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: atheer-sdk-release-aar
          path: atheer-sdk/build/outputs/aar/atheer-sdk-release.aar
          retention-days: 90
