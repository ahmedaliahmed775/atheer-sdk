name: Publish Atheer SDK to GitHub Packages

# متى يعمل هذا السكربت؟
on:
  release:
    types: [published] # تعديل: يعمل فقط عند نشر Release جديد بدلاً من كل Push

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      # خطوة جديدة: استخراج رقم الإصدار من الـ Release المنشور
      - name: Extract Release Version
        id: extract_version
        run: |
          # جلب اسم الـ Tag (مثل v1.0.0-beta)
          TAG_NAME="${{ github.event.release.tag_name }}"
          # إزالة حرف 'v' من البداية إن وُجد (v1.0.0-beta يصبح 1.0.0-beta)
          CLEAN_VERSION="${TAG_NAME#v}"
          # حفظ الرقم كمتغير بيئي للخطوة التالية
          echo "SDK_VERSION=$CLEAN_VERSION" >> $GITHUB_ENV

      - name: Build and Publish to GitHub Packages
        run: ./gradlew :atheer-sdk:publishReleasePublicationToGitHubPackagesRepository
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # لم نعد بحاجة لكتابة SDK_VERSION هنا لأنه تم تجهيزه في الخطوة السابقة
